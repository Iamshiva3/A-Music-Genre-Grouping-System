<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>500 - Server Error</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #07070f;
      --surface: #10101e;
      --accent: #c8ff57;
      --accent2: #ff5ef4;
      --text: #f0f0f8;
      --muted: #6b6b8a;
      --border: #1e1e36;
      --error: #ff6b6b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .error-container {
      text-align: center;
      max-width: 500px;
    }
    .error-code {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 5rem;
      color: var(--error);
      margin-bottom: 1rem;
    }
    .error-message {
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 1rem;
    }
    .error-description {
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      background: var(--accent);
      color: #07070f;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      padding: 0.85rem 1.75rem;
      border-radius: 4px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    a:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">500</div>
    <div class="error-message">Server Error</div>
    <div class="error-description">
      Something went wrong on our end. Please try again later or go back to the home page.
    </div>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
